appId: com.claude-nexus.app
productName: Claude Nexus
directories:
  output: release
  buildResources: build
files:
  - "**/*"
  - "!docs/**"
  - "!scripts/**"
  - "!release/**"
asarUnpack:
  - "mcp-server/**"
extraResources:
  - from: scripts/
    to: scripts/
publish:
  provider: github
  owner: tumourlove
  repo: claude-nexus
win:
  target: [nsis, portable]
  signAndEditExecutable: false
nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  runAfterFinish: true
