appId: com.claude-nexus.app
productName: Claude Nexus
directories:
  output: release
  buildResources: build
files:
  - "**/*"
  - "!docs/**"
  - "!scripts/**"
  - "!release/**"
extraResources:
  - from: scripts/
    to: scripts/
publish:
  provider: github
  owner: tumourlove
  repo: claude-nexus
win:
  target: [nsis, portable]
nsis:
  oneClick: false
  allowToCurrentUser: true
  runAfterFinish: true
  include: scripts/register-shell.js
